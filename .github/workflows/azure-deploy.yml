name: Build and Deploy API to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'CryptoCompanionApi/**'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: cryptocompanion-api-2101242956
  AZURE_WEBAPP_PACKAGE_PATH: './CryptoCompanionApi/publish'
  DOTNET_VERSION: '8.0.x' 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build and Publish
        run: |
          cd CryptoCompanionApi
          dotnet build --configuration Release
          dotnet publish -c Release -o ../${{ env.AZURE_WEBAPP_PACKAGE_PATH }} 

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
