apiVersion: apps/v1
kind: Deployment
metadata:
  name: cryptocompanion-api
  labels:
    app: cryptocompanion-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cryptocompanion-api
  template:
    metadata:
      labels:
        app: cryptocompanion-api
    spec:
      containers:
      - name: cryptocompanion-api
        image: cryptocompanionacr7638.azurecr.io/cryptocompanionapi:latest
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ConnectionStrings__DefaultConnection
          value: "Server=tcp:sql-cryptocompanion-fixed.database.windows.net,1433;Initial Catalog=CryptoCompanionDb;Persist Security Info=False;User ID=azureuser;Password=Changeme@315;MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"
        - name: ConnectionStrings__CosmosDbAccountEndpoint
          value: "https://cosmos-cryptocompanion-31374255.documents.azure.com:443/"
        - name: ConnectionStrings__CosmosDbAccountKey
          value: "jVKhsyOM2OBlP4kSqVDB9ihs9RrkjK2qW01cXwERtOElcVMDO4xuqUfObHZILcRdjqZ7OZ4BWxcBACDbOUHCug=="
        - name: OpenAI__Endpoint
          value: "https://cryptocompanion-ai-sw722.openai.azure.com/"
        - name: OpenAI__Key
          value: "6ktPbgxTYHHwyo5oVLM0Htn9Twe25VbBE4Orojf4navZJC4xu5MbJQQJ99CDACfhMk5XJ3w3AAABACOGYL5o"
        - name: OpenAI__DeploymentName
          value: "advisor-v1"
        # Connection strings should be mapped to K8s secrets or Key Vault in production
        # For simplicity in Review II, we can use the environment variables as in App Service
---
apiVersion: v1
kind: Service
metadata:
  name: cryptocompanion-api-service
spec:
  type: LoadBalancer
  selector:
    app: cryptocompanion-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
