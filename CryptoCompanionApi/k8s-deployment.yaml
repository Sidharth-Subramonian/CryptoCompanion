apiVersion: apps/v1
kind: Deployment
metadata:
  name: cryptocompanion-api
  labels:
    app: cryptocompanion-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cryptocompanion-api
  template:
    metadata:
      labels:
        app: cryptocompanion-api
    spec:
      containers:
      - name: cryptocompanion-api
        image: cryptocompanionacr7638.azurecr.io/cryptocompanionapi:latest
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: cryptocompanion-secrets
              key: sql-connection-string
        - name: ConnectionStrings__CosmosDbAccountEndpoint
          valueFrom:
            secretKeyRef:
              name: cryptocompanion-secrets
              key: cosmos-endpoint
        - name: ConnectionStrings__CosmosDbAccountKey
          valueFrom:
            secretKeyRef:
              name: cryptocompanion-secrets
              key: cosmos-key
        - name: OpenAI__Endpoint
          valueFrom:
            secretKeyRef:
              name: cryptocompanion-secrets
              key: openai-endpoint
        - name: OpenAI__Key
          valueFrom:
            secretKeyRef:
              name: cryptocompanion-secrets
              key: openai-key
        - name: OpenAI__DeploymentName
          value: "advisor-v1"
---
apiVersion: v1
kind: Service
metadata:
  name: cryptocompanion-api-service
spec:
  type: LoadBalancer
  selector:
    app: cryptocompanion-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
